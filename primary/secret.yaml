# IMPORTANT: This file contains base64-encoded placeholder values.
# Replace before applying, or better, generate via `kubectl create secret`
# or seal it with Sealed Secrets / External Secrets before committing to Git.
#
# To generate the base64 values yourself:
#   echo -n 'YourSuperuserPassword' | base64
#   echo -n 'replicator' | base64
#   echo -n 'YourReplicatorPassword' | base64
apiVersion: v1
kind: Secret
metadata:
  name: postgres-primary-secret
  namespace: postgres-ha
  labels:
    app: postgres-primary
type: Opaque
data:
  POSTGRES_USER: postgresadmin              # postgresadmin
  POSTGRES_PASSWORD: SuperSecure@2026!        # SuperSecure@2026!
  POSTGRES_DB: odoo_prod                       # odoo_prod
  REPLICATION_USER: pg_replica                # pg_replica
  REPLICATION_PASSWORD: Replica@2026         # Replica@2026!
