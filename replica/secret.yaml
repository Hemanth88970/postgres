# Same credentials as primary/secret.yaml — the replica needs the replication
# user/password to authenticate against the primary during pg_basebackup.
# Keep these two secrets in sync (or better: reference one shared Secret
# across both StatefulSets instead of duplicating it).
apiVersion: v1
kind: Secret
metadata:
  name: postgres-replica-secret
  namespace: postgres-ha
  labels:
    app: postgres-replica
type: Opaque
data:
  POSTGRES_USER: postgresadmin                # postgresadmin
  POSTGRES_PASSWORD: SuperSecure@2026!        # SuperSecure@2026!
  REPLICATION_USER: pg_replica                # pg_replica
  REPLICATION_PASSWORD: Replica@2026         # Replica@2026!